name: Release projects to standalone repositories

on:
  workflow_dispatch:
    inputs:
      projects:
        description: "JSON array of projects (optional, overrides affected detection)"
        required: false
      version:
        description: "Release version (e.g. 1.2.0)"
        required: true

  push:
    tags:
      - "*-v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  detect-affected-projects:
    name: Detect affected projects
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.projects == '' }}
    uses: ./.github/workflows/detect-affected-projects.yml

  resolve-projects:
    name: Resolve projects and version
    runs-on: ubuntu-latest
    needs: detect-affected-projects
    if: always()
    outputs:
      projects: ${{ steps.set.outputs.projects }}
      version: ${{ steps.set.outputs.version }}
    steps:
      - name: Resolve projects + version
        id: set
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.projects }}" != "" ]]; then
            PROJECTS='${{ inputs.projects }}'
          else
            PROJECTS='${{ needs.detect-affected-projects.outputs.projects }}'
          fi

          # Ensure PROJECTS is always a JSON array string
          if [[ -z "$PROJECTS" || "$PROJECTS" == "null" ]]; then
            PROJECTS="[]"
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME##*-v}"
          fi

          echo "Resolved projects: $PROJECTS"
          echo "Resolved version: $VERSION"

          echo "projects=$PROJECTS" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-and-release:
    name: Build & release ${{ matrix.project }}
    needs: resolve-projects
    if: always()
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.resolve-projects.outputs.projects) }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js and PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install Composer dependencies
        run: npx nx run ${{ matrix.project }}:composer-install

      - name: Build project
        run: npx nx run ${{ matrix.project }}:build

      - name: Prepare subtree and build for readonly repo
        shell: bash
        run: |
          set -e

          PROJECT=${{ matrix.project }}
          VERSION=${{ needs.resolve-projects.outputs.version }}

          # Determine project root
          ROOT=$(npx nx show project $PROJECT --json | jq -r .root)

          echo "Building project $PROJECT at root: $ROOT"

          # Build the project first in the main branch
          npx nx run $PROJECT:build
          echo "Build complete. Checking for dist/ directory..."
          
          if [ ! -d "$ROOT/dist" ] && [ ! -d "dist" ]; then
            echo "Error: dist/ folder not found after build"
            exit 1
          fi

          # Create a split branch from the project root
          git subtree split -P "$ROOT" -b split-branch
          git checkout split-branch

          # Configure git author
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Copy build output into the split branch if needed
          # Nx typically outputs to $ROOT/dist
          if [ -d "$ROOT/dist" ]; then
            cp -R "$ROOT/dist" ./dist
          fi

          # Commit build artifacts
          git add dist
          git commit -m "chore(release): build $PROJECT@$VERSION" || echo "No build changes"

          echo "Subtree branch prepared with build output."

      - name: Build Changelog
        id: github_release
        uses: mikepenz/release-changelog-builder-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLISH_REPO_TOKEN }}

      - name: Push to readonly repository
        shell: bash
        env:
          TOKEN: ${{ secrets.PUBLISH_REPO_TOKEN }}
        run: |
          PROJECT=${{ matrix.project }}
          VERSION=${{ needs.resolve-projects.outputs.version }}

          git remote remove target 2>/dev/null || true
          git remote add target https://x-access-token:${TOKEN}@github.com/kshapka-bcgov/${PROJECT}.git
          git push -f target split-branch:${{ github.head_ref || github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          repository: kshapka-bcgov/${{ matrix.project }}
          tag_name: v${{ needs.resolve-projects.outputs.version }}
          body: ${{steps.github_release.outputs.changelog}}
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLISH_REPO_TOKEN }}