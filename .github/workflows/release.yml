name: Release projects to read-only repositories

on:
  release:
    types:
      - published   # triggers when a release is published in the monorepo

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  detect-affected-projects:
    name: Detect affected projects
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.compute.outputs.projects }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Compute projects
        id: compute
        shell: bash
        run: |
          # For now, release all projects in this example
          PROJECTS='["bcgov-wordpress-blocks"]'
          echo "projects=$PROJECTS" >> "$GITHUB_OUTPUT"

  build-and-release:
    name: Build & release ${{ matrix.project }}
    needs: detect-affected-projects
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.detect-affected-projects.outputs.projects) }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js and PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install Composer dependencies
        run: npx nx run ${{ matrix.project }}:composer-install

      - name: Build project
        run: npx nx run ${{ matrix.project }}:build

      - name: Prepare subtree and build for readonly repo
        shell: bash
        run: |
          set -e

          PROJECT=${{ matrix.project }}
          TAG=${{ github.event.release.tag_name }}
          ROOT=$(npx nx show project $PROJECT --json | jq -r .root)

          echo "Building project $PROJECT at root: $ROOT"

          npx nx run $PROJECT:build
          echo "Build complete."

          git subtree split -P "$ROOT" -b split-branch
          git checkout split-branch

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Copy build output
          if [ -d "$ROOT/dist" ]; then
            cp -R "$ROOT/dist" ./dist
          fi

          git add dist
          git commit -m "chore(release): build $PROJECT@$TAG" || echo "No build changes"

          # Strip project prefix from monorepo tag for readonly repo
          CLEAN_TAG="${TAG##*-}"
          CLEAN_TAG="${CLEAN_TAG}"
          echo "CLEAN_TAG=$CLEAN_TAG" >> $GITHUB_ENV

      - name: Push to readonly repository
        shell: bash
        env:
          TOKEN: ${{ secrets.PUBLISH_REPO_TOKEN }}
        run: |
          PROJECT=${{ matrix.project }}
          git remote remove target 2>/dev/null || true
          git remote add target https://x-access-token:${TOKEN}@github.com/kshapka-bcgov/${PROJECT}.git
          git push -f target split-branch:main
          git push -f target "$CLEAN_TAG"

      - name: Create GitHub Release in readonly repo
        uses: softprops/action-gh-release@v1
        with:
          repository: kshapka-bcgov/${{ matrix.project }}
          tag_name: ${{ env.CLEAN_TAG }}
          name: ${{ github.event.release.name || env.CLEAN_TAG }}
          body: ${{ github.event.release.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLISH_REPO_TOKEN }}